<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba Cámara</title>
<style>
body{
  text-align:center;
  font-family:Arial;
}
video{
  width:90%;
  border-radius:10px;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body>

<h2>Prueba de Cámara</h2>
<video id="video" autoplay playsinline></video>
<br>
<button onclick="setCorte(10)">Bs 10</button>
<button onclick="setCorte(20)">Bs 20</button>
<button onclick="setCorte(50)">Bs 50</button>

<p>Corte seleccionado: <span id="corteActual">20</span></p>
<br>
<button onclick="capturar()">Capturar</button>
<canvas id="canvas" style="display:none;"></canvas>
<div id="resultado"></div>

<script src="rango.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {

  const video = document.getElementById("video");

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("Tu navegador no soporta acceso a la cámara o no estás en HTTPS.");
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: { ideal: "environment" },
    width: { ideal: 1280 },
    height: { ideal: 720 },
    focusMode: "continuous"
  }
});

    video.srcObject = stream;

  } catch (error) {
    alert("Error al acceder a la cámara: " + error.message);
    console.log(error);
  }

});
let corteSeleccionado = 20;

function setCorte(valor) {
  corteSeleccionado = valor;
  document.getElementById("corteActual").innerText = valor;
}

async function capturar() {

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const context = canvas.getContext("2d");

  if (!video.videoWidth) {
    alert("La cámara aún no está lista");
    return;
  }

  const x = video.videoWidth * 0.25;
  const y = video.videoHeight * 0.45;
  const w = video.videoWidth * 0.5;
  const h = video.videoHeight * 0.15;

  canvas.width = w;
  canvas.height = h;

  context.drawImage(video, x, y, w, h, 0, 0, w, h);

  document.getElementById("resultado").innerHTML = "⏳ Analizando...";

  const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
const data = imageData.data;

for (let i = 0; i < data.length; i += 4) {
  const gray = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
  const value = gray > 140 ? 255 : 0;
  data[i] = data[i+1] = data[i+2] = value;
}

context.putImageData(imageData, 0, 0);
  const { data: { text } } = await Tesseract.recognize(
    canvas,
    'eng',
    {
      tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      tessedit_pageseg_mode: 7
    }
  );

  console.log("Texto detectado:", text);

  const match = text.match(/(\d{7,9})\s?([A-Z])/);

  if (match) {
    const numero = parseInt(match[1]);
    const serie = match[2];

    if (estaInhabilitado(corteSeleccionado, serie, numero)) {
      document.getElementById("resultado").innerHTML = "🔴 INHABILITADO";
      navigator.vibrate([300,100,300]);
    } else {
      document.getElementById("resultado").innerHTML = "🟢 VÁLIDO";
      navigator.vibrate(200);
    }
  } else {
    document.getElementById("resultado").innerHTML = "❌ No se pudo leer el número";
  }
}
</script>

</body>
</html>
