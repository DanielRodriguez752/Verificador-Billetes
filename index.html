<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador de Billetes</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#1e1e1e; /* Fondo plomo oscuro */
  color:#f2f2f2;
  text-align:center;
}

/* PANTALLA INICIAL */
#pantallaInicio{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#pantallaInicio h2{
  margin-bottom:40px;
  font-size:24px;
  color:#ffffff;
}

/* BOTONES GRANDES */
#pantallaInicio button{
  width:85%;
  height:85px;
  font-size:28px;
  margin:15px 0;
  border:none;
  border-radius:18px;
  color:white;
  font-weight:bold;
  cursor:pointer;

  /* RELIEVE */
  box-shadow: 
    0 8px 0 rgba(0,0,0,0.6),
    0 12px 20px rgba(0,0,0,0.5);

  transition: all 0.15s ease;
}

/* EFECTO AL PRESIONAR */
#pantallaInicio button:active{
  transform: translateY(6px);
  box-shadow: 
    0 2px 0 rgba(0,0,0,0.6),
    0 6px 12px rgba(0,0,0,0.4);
}

/* Colores individuales */
#pantallaInicio button:nth-child(2){
  background:linear-gradient(145deg,#2E86C1,#1B4F72);
}

#pantallaInicio button:nth-child(3){
  background:linear-gradient(145deg,#28B463,#196F3D);
}

#pantallaInicio button:nth-child(4){
  background:linear-gradient(145deg,#CB4335,#78281F);
}

/* ESCANER */
.container{
  position:relative;
  display:inline-block;
  width:95%;
  margin-top:20px;
}

video{
  width:100%;
  border-radius:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

.guia{
  position:absolute;
  border:3px solid #00ff88;
  width:60%;
  height:18%;
  top:45%;
  left:20%;
  border-radius:10px;
  pointer-events:none;
}

#resultado{
  font-size:30px;
  margin-top:20px;
  font-weight:bold;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="rango.js"></script>
</head>

<body>

<!-- PANTALLA INICIAL -->
<div id="pantallaInicio">
  <h2 style="position:absolute; top:40px;">¿Qué billete vas a verificar?</h2>
  <button onclick="iniciarEscaner(10)">Bs 10</button>
  <button onclick="iniciarEscaner(20)">Bs 20</button>
  <button onclick="iniciarEscaner(50)">Bs 50</button>
</div>

<!-- PANTALLA ESCANER -->
<div id="pantallaEscaner" style="display:none;">
  <h2>Escaneando Billete Bs <span id="corteMostrado"></span></h2>

  <div class="container">
    <video id="video" autoplay playsinline></video>
    <div class="guia"></div>
  </div>

  <div id="resultado" style="font-size:24px; margin-top:20px;"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

let corteSeleccionado = 20;
let escaneando = false;
let bloqueado = false;

function iniciarEscaner(valor){
  corteSeleccionado = valor;

  document.getElementById("corteMostrado").innerText = valor;
  document.getElementById("pantallaInicio").style.display = "none";
  document.getElementById("pantallaEscaner").style.display = "block";

  iniciarCamara();
}

async function iniciarCamara(){

  const video = document.getElementById("video");

  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ ideal:"environment" },
        width:{ ideal:1280 },
        height:{ ideal:720 },
        focusMode:"continuous"
      }
    });

    video.srcObject = stream;

    setInterval(()=>{
      escanearAutomatico();
    },1500);

  }catch(error){
    alert("Error cámara: " + error.message);
  }
}

async function escanearAutomatico(){

  if(escaneando || bloqueado) return;
  escaneando = true;

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const context = canvas.getContext("2d");

  if(!video.videoWidth){
    escaneando = false;
    return;
  }

  const x = video.videoWidth * 0.25;
  const y = video.videoHeight * 0.45;
  const w = video.videoWidth * 0.5;
  const h = video.videoHeight * 0.15;

  canvas.width = w;
  canvas.height = h;

  context.drawImage(video,x,y,w,h,0,0,w,h);

  // Alto contraste
  const imageData = context.getImageData(0,0,w,h);
  const data = imageData.data;

  for(let i=0;i<data.length;i+=4){
    const gray = data[i]*0.3 + data[i+1]*0.59 + data[i+2]*0.11;
    const value = gray > 140 ? 255 : 0;
    data[i] = data[i+1] = data[i+2] = value;
  }

  context.putImageData(imageData,0,0);

  try{

    const { data:{ text } } = await Tesseract.recognize(
      canvas,
      'eng',
      {
        tessedit_char_whitelist:'0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        tessedit_pageseg_mode:7
      }
    );

    const limpio = text.replace(/\s/g,'');
    const match = limpio.match(/(\d{7,9})([A-Z])/);

    if(match){

      const numero = parseInt(match[1]);
      const serie = match[2];

      document.getElementById("beep").play();

      if(estaInhabilitado(corteSeleccionado,serie,numero)){
        document.getElementById("resultado").innerHTML="🔴 INHABILITADO";
        navigator.vibrate([300,100,300]);
      }else{
        document.getElementById("resultado").innerHTML="🟢 VÁLIDO";
        navigator.vibrate(200);
      }

      bloqueado = true;

      setTimeout(()=>{
        bloqueado = false;
        document.getElementById("resultado").innerHTML="";
      },3000);
    }

  }catch(e){
    console.log("Error OCR:",e);
  }

  escaneando = false;
}

</script>
<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
</body>
</html>
